# ILD分类器配置

# 分类优先级（数字越小优先级越高）
priority:
  结缔组织病: 1
  特发性肺纤维化: 2
  淋巴细胞性: 3
  IgG: 4
  闭塞性: 5
  结节病: 6
  肺泡蛋白沉积症: 7
  间质性肺病伴有纤维化: 8
  具有自身免疫特征的间质性肺病: 9
  机化: 10

# 输出列顺序
output_columns:
  - 姓名
  - 结缔组织病
  - 特发性肺纤维化
  - 淋巴细胞性
  - IgG
  - 闭塞性
  - 结节病
  - 肺泡蛋白沉积症
  - 间质性肺病伴有纤维化
  - 具有自身免疫特征的间质性肺病
  - 机化
  - 其他